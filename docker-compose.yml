    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
        ports:
            - '9200:9200'
            - '9300:9300'
        environment:
            - xpack.security.enabled=false
            - discovery.type=single-node
            - bootstrap.memory_lock=true
            - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile:
                soft: 65536
                hard: 65536
        volumes:
            - 'sail-elasticsearch:/var/lib/elasticsearch/data'
        networks:
            - sail
    kibana:
        image: docker.elastic.co/kibana/kibana:7.17.0
        ports:
            - 5601:5601
        environment:
            ELASTICSEARCH_HOSTS: 'http://elasticsearch:9200'
        networks:
            - sail
        depends_on:
            - elasticsearch
    pgsql:
        image: 'postgres:16'
        ports:
            - '${FORWARD_PGSQL_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PGSQL_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_PGSQL_DATABASE:-bagisto_pg}'
            POSTGRES_USER: '${DB_PGSQL_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PGSQL_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_PGSQL_DATABASE:-bagisto_pg}'
                - '-U'
                - '${DB_PGSQL_USERNAME:-sail}'
            retries: 3
            timeout: 5s
    adminer:
        image: 'adminer:latest'
        ports:
            - '2280:8080'
        networks:
            - sail
        depends_on:
            - pgsql
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    sail-pgsql:
        driver: local
    sail-elasticsearch:
        driver: local
