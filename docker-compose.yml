services:
    laravel.test:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                WWWUSER: '${WWWUSER:-1000}'
        image: sail-8.3/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            APP_ENV: '${APP_ENV:-local}'
            DB_CONNECTION: '${DB_PGSQL_CONNECTION:-pgsql}'
            DB_HOST: '${DB_PGSQL_HOST:-pgsql}'
            DB_PORT: '${DB_PGSQL_PORT:-5432}'
            DB_DATABASE: '${DB_PGSQL_DATABASE:-bagisto_pg}'
            DB_USERNAME: '${DB_PGSQL_USERNAME:-sail}'
            DB_PASSWORD: '${DB_PGSQL_PASSWORD:-secret}'
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - elasticsearch
            - kibana
            - mailpit
