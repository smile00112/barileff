services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-Surprise}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./public:/var/www/html/public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - APP_NAME=${APP_NAME:-Surprise}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_DEBUG_ALLOWED_IPS=${APP_DEBUG_ALLOWED_IPS:-}
      - APP_URL=${APP_URL}
      - APP_ADMIN_URL=${APP_ADMIN_URL:-admin}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - APP_LOCALE=${APP_LOCALE:-ru}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-ru}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-en_US}
      - APP_CURRENCY=${APP_CURRENCY:-RUB}
      - TELESCOPE_ENABLED=${TELESCOPE_ENABLED:-false}
      - OCTANE_SERVER=roadrunner
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-reverb}
      - REVERB_APP_ID=${REVERB_APP_ID:-my-app-id}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-my-app-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-my-app-secret}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-public}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - RESPONSE_CACHE_ENABLED=${RESPONSE_CACHE_ENABLED:-true}
      - LOG_DEPRECATIONS_CHANNEL=${LOG_DEPRECATIONS_CHANNEL:-null}
      - DB_CONNECTION=mysql
      - PGSQL_HOST=postgres
      - PGSQL_PORT=5432
      - PGSQL_DATABASE=${PGSQL_DATABASE:-app}
      - PGSQL_USERNAME=${PGSQL_USERNAME:-app}
      - PGSQL_PASSWORD=${PGSQL_PASSWORD}
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan octane:status || nc -z localhost 8000 || wget --quiet --tries=1 --spider http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-Surprise}_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${ADMINER_PORT:-2028}:2028"
      - "${KIBANA_PORT:-2029}:2029"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DOMAIN=${DOMAIN:-surprise.softnova.ru}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/templates/ssl-params.inc.template:ro
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./docker/nginx/logs:/var/log/nginx
      - ./docker/certbot/www:/var/www/certbot:ro
    networks:
      - app-network
    depends_on:
      - app
      - reverb
      - adminer
      - kibana
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || nc -z localhost 80"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: ${APP_NAME:-Surprise}_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "0"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    command: --authentication-policy=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-Surprise}_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
      exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru;
      else
      exec redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru;
      fi'
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: ${APP_NAME:-Surprise}_adminer
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    networks:
      - app-network
    depends_on:
      - mysql
      - postgres

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-Surprise}_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - APP_NAME=${APP_NAME:-Surprise}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - TELESCOPE_ENABLED=false
      - REVERB_APP_ID=${REVERB_APP_ID:-my-app-id}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-my-app-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-my-app-secret}
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_HOST=${DOMAIN:-surprise.softnova.ru}
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || wget --quiet --tries=1 --spider http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-Surprise}_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --queue=default,broadcastable --sleep=3 --tries=3 --max-time=3600 --timeout=300
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - APP_NAME=${APP_NAME:-Surprise}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_DEBUG_ALLOWED_IPS=${APP_DEBUG_ALLOWED_IPS:-}
      - APP_URL=${APP_URL}
      - APP_ADMIN_URL=${APP_ADMIN_URL:-admin}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - APP_LOCALE=${APP_LOCALE:-ru}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-ru}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-en_US}
      - APP_CURRENCY=${APP_CURRENCY:-RUB}
      - TELESCOPE_ENABLED=${TELESCOPE_ENABLED:-false}
      - OCTANE_SERVER=roadrunner
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-reverb}
      - REVERB_APP_ID=${REVERB_APP_ID:-my-app-id}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-my-app-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-my-app-secret}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-public}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - RESPONSE_CACHE_ENABLED=${RESPONSE_CACHE_ENABLED:-true}
      - LOG_DEPRECATIONS_CHANNEL=${LOG_DEPRECATIONS_CHANNEL:-null}
      - DB_CONNECTION=mysql
      - PGSQL_HOST=postgres
      - PGSQL_PORT=5432
      - PGSQL_DATABASE=${PGSQL_DATABASE:-app}
      - PGSQL_USERNAME=${PGSQL_USERNAME:-app}
      - PGSQL_PASSWORD=${PGSQL_PASSWORD}
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-Surprise}_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FORWARD_PGSQL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${PGSQL_DATABASE:-app}
      POSTGRES_USER: ${PGSQL_USERNAME:-app}
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: ${APP_NAME:-Surprise}_elasticsearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FORWARD_ES_PORT:-9200}:9200"
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0
    container_name: ${APP_NAME:-Surprise}_kibana
    restart: unless-stopped
    expose:
      - "5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_BASEPATH=
    networks:
      - app-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  certbot:
    image: certbot/certbot:latest
    container_name: ${APP_NAME:-Surprise}_certbot
    restart: unless-stopped
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - ./docker/nginx/ssl-logs:/var/log/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    networks:
      - app-network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done;'"

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
