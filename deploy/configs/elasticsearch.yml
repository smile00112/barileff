# Elasticsearch 7.17 configuration for Bagisto (bare-metal)
# Managed by Bagisto deploy scripts — do not edit manually

# Cluster / Node
cluster.name: bagisto
node.name: bagisto-node-1

# Network — listen only on localhost
network.host: 127.0.0.1
http.port: 9200
transport.port: 9300

# Discovery — single-node mode
discovery.type: single-node
cluster.initial_master_nodes: ["bagisto-node-1"]

# Paths
path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

# Security — disabled (internal network only)
xpack.security.enabled: false
xpack.ml.enabled: false

# Memory — lock for performance
bootstrap.memory_lock: true

# Indices
action.destructive_requires_name: true
