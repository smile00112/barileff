# Redis configuration for Bagisto (bare-metal)
# Managed by Bagisto deploy scripts — do not edit manually

# Network
bind 127.0.0.1 -::1
port 6379
protected-mode yes

# Authentication (set by install.sh via requirepass)
# requirepass REDIS_PASSWORD_PLACEHOLDER

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence — AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Persistence — RDB (snapshot fallback)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Performance
tcp-keepalive 300
tcp-backlog 511
timeout 0

hz 10
dynamic-hz yes

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   "CONFIG_BAGISTO_INTERNAL"
rename-command DEBUG    ""
